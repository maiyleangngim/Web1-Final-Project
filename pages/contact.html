<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>

</head>
<body>

<!-- 🔹 HEADER (same as About) -->
<header class="header">
    <h1>Contact Us</h1>
</header>

<!-- 🔹 CONTACT SECTION -->
<section class="contact-section">

    <div class="contact-card">

        <h2>Get in Touch</h2>

        <!-- CONTACT INFO -->
        <div class="contact-info">
            <p>📞 Phone: +855 92 914 678</p>
            <p>💬 Telegram: @UniKhmer</p>

            <a href="https://t.me/sengsereysolida" target="_blank" class="telegram-btn">
                Message on Telegram
            </a>
        </div>

        <!-- FORM -->
        <form class="contact-form">
            <label>Name</label>
            <input type="text" placeholder="Enter your name" required>

            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Message</label>

            <button type="submit">Send Message</button>
        </form>

    </div>

</section>

</body>
</html>
